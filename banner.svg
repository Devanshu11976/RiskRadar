<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1226"/>
      <stop offset="45%" stop-color="#1b1f4d"/>
      <stop offset="100%" stop-color="#2d1b69"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C9CFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5C7CFA" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C8C" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0.07"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5EE7C8" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#4FD1B8" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#C9D4FF"/>
      <stop offset="100%" stop-color="#9D8CFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <radialGradient id="dotGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8FA8FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#8FA8FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="url(#bgGrad)"/>

  <!-- ambient floating glow orbs -->
  <circle cx="150" cy="60" r="90" fill="url(#dotGlow)">
    <animate attributeName="cy" values="60;90;60" dur="7s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="250" r="110" fill="url(#dotGlow)">
    <animate attributeName="cy" values="250;215;250" dur="8s" repeatCount="indefinite"/>
  </circle>

  <!-- radar sweep, centered behind title -->
  <g transform="translate(600,98)">
    <circle r="70" fill="none" stroke="#7C9CFF" stroke-opacity="0.18" stroke-width="1"/>
    <circle r="48" fill="none" stroke="#7C9CFF" stroke-opacity="0.15" stroke-width="1"/>
    <circle r="26" fill="none" stroke="#7C9CFF" stroke-opacity="0.12" stroke-width="1"/>
    <g>
      <path d="M0,0 L0,-70 A70,70 0 0,1 49.5,-49.5 Z" fill="#9D8CFF" opacity="0.16"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="38" cy="-22" r="3" fill="#FF8C8C">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" cy="44" r="3" fill="#5EE7C8">
      <animate attributeName="opacity" values="0;1;0" dur="3.1s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- subtle grid lines for depth -->
  <g stroke="#FFFFFF" stroke-opacity="0.04">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="1000" y1="0" x2="1000" y2="320"/>
  </g>

  <!-- Floating glass card 1 : Stream -->
  <g filter="url(#softShadow)">
    <g transform="translate(105,205)">
      <animateTransform attributeName="transform" type="translate" values="105,205; 105,193; 105,205" dur="4.5s" repeatCount="indefinite" additive="sum"/>
      <rect x="0" y="0" width="160" height="86" rx="16" fill="url(#cardGrad1)" stroke="#9FB4FF" stroke-opacity="0.5" stroke-width="1.3"/>
      <rect x="0" y="0" width="160" height="86" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="0.6"/>
      <circle cx="26" cy="28" r="11" fill="#7C9CFF" opacity="0.85"/>
      <path d="M20,28 q3,-7 6,0 q3,-7 6,0 q3,-7 6,0" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <text x="46" y="32" fill="#EAF0FF" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="bold">Stream</text>
      <text x="20" y="58" fill="#C9D4FF" font-family="Verdana, Arial, sans-serif" font-size="10">Apache Kafka</text>
      <text x="20" y="74" fill="#C9D4FF" font-family="Verdana, Arial, sans-serif" font-size="10" opacity="0.8">Real-time ingest</text>
    </g>
  </g>

  <!-- Floating glass card 2 : Score -->
  <g filter="url(#softShadow)">
    <g transform="translate(520,165)">
      <animateTransform attributeName="transform" type="translate" values="520,165; 520,150; 520,165" dur="5.2s" repeatCount="indefinite" additive="sum"/>
      <rect x="0" y="0" width="165" height="92" rx="16" fill="url(#cardGrad2)" stroke="#FFB0B0" stroke-opacity="0.5" stroke-width="1.3"/>
      <rect x="0" y="0" width="165" height="92" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="0.6"/>
      <circle cx="27" cy="29" r="11" fill="#FF8C8C" opacity="0.85"/>
      <path d="M21,33 l5,-10 l4,4 l6,-9" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="48" y="33" fill="#FFEDED" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="bold">Score</text>
      <text x="20" y="60" fill="#FFD6D6" font-family="Verdana, Arial, sans-serif" font-size="10">Risk weighting</text>
      <text x="20" y="76" fill="#FFD6D6" font-family="Verdana, Arial, sans-serif" font-size="10" opacity="0.8">0 – 1 fraud scale</text>
    </g>
  </g>

  <!-- Floating glass card 3 : Alert -->
  <g filter="url(#softShadow)">
    <g transform="translate(940,200)">
      <animateTransform attributeName="transform" type="translate" values="940,200; 940,188; 940,200" dur="4.8s" repeatCount="indefinite" additive="sum"/>
      <rect x="0" y="0" width="155" height="86" rx="16" fill="url(#cardGrad3)" stroke="#7FE3CB" stroke-opacity="0.5" stroke-width="1.3"/>
      <rect x="0" y="0" width="155" height="86" rx="16" fill="none" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="0.6"/>
      <circle cx="26" cy="28" r="11" fill="#5EE7C8" opacity="0.85"/>
      <path d="M26,21 v8 M26,33 v1.5" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
      <text x="46" y="32" fill="#E7FFF8" font-family="Verdana, Arial, sans-serif" font-size="13" font-weight="bold">Alert</text>
      <text x="20" y="58" fill="#C7F5E8" font-family="Verdana, Arial, sans-serif" font-size="10">Live dashboard</text>
      <text x="20" y="74" fill="#C7F5E8" font-family="Verdana, Arial, sans-serif" font-size="10" opacity="0.8">Triage &amp; resolve</text>
    </g>
  </g>

  <!-- connecting flow lines between cards -->
  <g stroke="#9FB4FF" stroke-opacity="0.45" stroke-width="1.6" fill="none" stroke-dasharray="5 5">
    <path d="M265,235 C 380,200 420,190 520,200">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.3s" repeatCount="indefinite"/>
    </path>
    <path d="M685,205 C 800,210 850,225 940,235">
      <animate attributeName="stroke-dashoffset" values="0;-20" dur="1.3s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Main title -->
  <text x="600" y="100" text-anchor="middle" fill="url(#textGrad)" font-family="Verdana, Arial, sans-serif" font-size="60" font-weight="bold" filter="url(#glow)" letter-spacing="2">
    RiskRadar
  </text>
  <text x="600" y="132" text-anchor="middle" fill="#C9D4FF" font-family="Verdana, Arial, sans-serif" font-size="16" letter-spacing="3" opacity="0.9">
    REAL-TIME FRAUD DETECTION
  </text>

  <!-- pulsing accent line under title -->
  <rect x="500" y="146" width="200" height="2.5" rx="1.25" fill="#9D8CFF">
    <animate attributeName="width" values="0;200;200" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="x" values="600;500;500" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
  </rect>
</svg>
